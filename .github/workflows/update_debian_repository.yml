name: Update Debian Repository

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: update-debian-repository

env:
  REGISTRY: ghcr.io

jobs:
  update:
    name: Update Debian Repository
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: plengauer/create-debian-repository@2d3d79460d6c590c0f4e0dac6419d268c7d7a83d # v1.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'packages'
  deploy:
    name: Deploy to GitHub Pages
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164fe57e1e4cee7ac0b8c0847c85b3c0c8 # v4.0.5
