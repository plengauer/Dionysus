name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK
        uses: actions/setup-java@99b8673ff64fbce33470cd4441cecd4dd40eba3d # v4.2.1
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: |
          ls -la
